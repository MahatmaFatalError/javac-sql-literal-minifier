name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  maven-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and verify
        run: ./mvnw clean verify

  gradle-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and lint Gradle plugin
        run: ./gradlew :gradle-plugin:check

  maven-integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Install test artifacts
        run: ./mvnw install -DskipTests

      - name: Run external Maven integration test
        run: ./mvnw -pl integration-tests -DrunIntegrationTests=true test
